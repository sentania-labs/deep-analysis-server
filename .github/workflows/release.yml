name: Release

# Skeleton: fires on real tags once repos are public. Until then this is a
# no-op (there are no tags). TODO: enable push:true when the GHCR org
# namespace `sentania-labs` is ready to receive images.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, ingest, parser, analytics, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          # TODO: set push: true once sentania-labs GHCR namespace is live.
          push: false
          tags: |
            ghcr.io/sentania-labs/deep-analysis-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/sentania-labs/deep-analysis-${{ matrix.service }}:latest
