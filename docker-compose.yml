# docker-compose.yml — Deep Analysis server stack (W1a: infra-only)
#
# This slice stands up the three infrastructure containers — postgres, redis,
# and the Caddy gateway. Application service containers (auth, ingest, parser,
# analytics, web) land in W1b; their stubs are commented out below.
#
# Usage:
#   cp .env.example .env        # set POSTGRES_PASSWORD
#   docker compose up -d        # brings up postgres, redis, gateway
#
# Upstreams referenced in the Caddyfile will 502 until W1b lands — that is
# expected. The gateway topology is live from W1a forward so later slices
# only add containers, never rewire routing.

name: deep-analysis

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: deep_analysis
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d deep_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", ""]
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # TODO(W1b): auth service stub — add here

  # TODO(W1b): ingest service stub — add here

  # TODO(W1b): parser service stub — add here

  # TODO(W1b): analytics service stub — add here

  # TODO(W1b): web service stub — add here

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  caddy_data:
