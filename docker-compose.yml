# docker-compose.yml — Deep Analysis server stack
#
# Usage:
#   cp .env.example .env        # set POSTGRES_PASSWORD
#   docker compose up -d

name: deep-analysis

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: deep_analysis
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d deep_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", ""]
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    environment:
      DA_SERVICE_NAME: auth
      DA_DATABASE_URL: ${DA_DATABASE_URL:-}
      DA_REDIS_URL: ${DA_REDIS_URL:-redis://redis:6379/0}
      DA_JWT_PUBLIC_KEY_PATH: ${DA_JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
      DA_LOG_LEVEL: ${DA_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    environment:
      DA_SERVICE_NAME: ingest
      DA_DATABASE_URL: ${DA_DATABASE_URL:-}
      DA_REDIS_URL: ${DA_REDIS_URL:-redis://redis:6379/0}
      DA_JWT_PUBLIC_KEY_PATH: ${DA_JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
      DA_LOG_LEVEL: ${DA_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  parser:
    build:
      context: .
      dockerfile: services/parser/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    environment:
      DA_SERVICE_NAME: parser
      DA_DATABASE_URL: ${DA_DATABASE_URL:-}
      DA_REDIS_URL: ${DA_REDIS_URL:-redis://redis:6379/0}
      DA_JWT_PUBLIC_KEY_PATH: ${DA_JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
      DA_LOG_LEVEL: ${DA_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    environment:
      DA_SERVICE_NAME: analytics
      DA_DATABASE_URL: ${DA_DATABASE_URL:-}
      DA_REDIS_URL: ${DA_REDIS_URL:-redis://redis:6379/0}
      DA_JWT_PUBLIC_KEY_PATH: ${DA_JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
      DA_LOG_LEVEL: ${DA_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    restart: unless-stopped
    networks:
      - frontend
      - backend
    environment:
      DA_SERVICE_NAME: web
      DA_DATABASE_URL: ${DA_DATABASE_URL:-}
      DA_REDIS_URL: ${DA_REDIS_URL:-redis://redis:6379/0}
      DA_JWT_PUBLIC_KEY_PATH: ${DA_JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
      DA_LOG_LEVEL: ${DA_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  caddy_data:
